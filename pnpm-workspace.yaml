# pnpm v10 liest Einstellungen hier, nicht mehr aus dem "pnpm"-Feld der package.json.
# esbuild wird durch esbuild-wasm ersetzt (reines JS, KEIN Build-Skript) -> vermeidet
# ERR_PNPM_IGNORED_BUILDS in der Hostinger-Build-Sandbox.
overrides:
  esbuild: npm:esbuild-wasm@^0.28.0
onlyBuiltDependencies:
  - '@tailwindcss/oxide'
